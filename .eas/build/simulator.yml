build:
  name: iOS Simulator
  steps:
    - eas/checkout
    - eas/install_node_modules
    - eas/prebuild
    - run:
        name: Patch Podfile and install pods
        working_directory: ios
        command: |
          sed -i '' '/:privacy_file_aggregation_enabled/d' Podfile
          pod install
    - run:
        name: Build for iOS Simulator
        working_directory: ios
        command: |
          xcodebuild \
            -workspace VoidTechLogistics.xcworkspace \
            -scheme VoidTechLogistics \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
    - uses: eas/upload_artifact
      with:
        path: ios/build/Build/Products/Debug-iphonesimulator/VoidTechLogistics.app
